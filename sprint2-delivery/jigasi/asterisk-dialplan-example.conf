; =============================================================================
; Asterisk Dialplan — Jigasi SIP Dial-In with JWT Authentication
; =============================================================================
;
; This dialplan snippet shows how to authenticate SIP callers into Jitsi Meet
; conferences via Jigasi using a dynamically generated JWT token.
;
; Prerequisites:
;   1. generate-jwt-agi.py installed in /var/lib/asterisk/agi-bin/
;      chmod 755 /var/lib/asterisk/agi-bin/generate-jwt-agi.py
;   2. /etc/jitsi/jigasi/jwt-config.env with APP_ID, APP_SECRET, DOMAIN
;      chmod 600 /etc/jitsi/jigasi/jwt-config.env
;   3. Jigasi configured to accept SIP INVITE with custom headers:
;      - Jitsi-Conference-Room  (the room name)
;      - Authorization           (Bearer <JWT>)
;
; jwt-config.env format:
;   # Jitsi JWT Configuration for Jigasi SIP Authentication
;   # Place at /etc/jitsi/jigasi/jwt-config.env
;   # chmod 600 /etc/jitsi/jigasi/jwt-config.env
;   APP_ID=jitsi
;   APP_SECRET=your_shared_secret_here
;   DOMAIN=jitsi-00.zitovoice.com
;
; Author: theluckystrike
; =============================================================================


; -----------------------------------------------------------------------------
; PATTERN 1: Fixed Room
; Caller dials a specific extension (e.g. 5001) and lands in a predetermined
; conference room. Useful for persistent/scheduled meeting rooms.
; -----------------------------------------------------------------------------
[jitsi-fixed-room]

; Step 1: Answer the call and play a brief greeting
exten => 5001,1,Answer()
    same => n,Playback(conf-therewillbebeep)

; Step 2: Set the target room name (fixed for this extension)
    same => n,Set(JITSI_ROOM=standup-daily)

; Step 3: Call the AGI script to generate a JWT token
;         Arguments: arg1 = CallerID number, arg2 = room name
    same => n,AGI(generate-jwt-agi.py,${CALLERID(num)},${JITSI_ROOM})

; Step 4: Check if JWT generation succeeded
    same => n,GotoIf($["${JWT_STATUS}" != "OK"]?jwt_fail,1)

; Step 5: Set the SIP headers that Jigasi expects
;         Jitsi-Conference-Room tells Jigasi which room to join
    same => n,SIPAddHeader(Jitsi-Conference-Room: ${JITSI_ROOM})
;         Authorization header carries the JWT for authentication
    same => n,SIPAddHeader(Authorization: Bearer ${JWT_TOKEN})

; Step 6: Dial Jigasi via SIP trunk
;         Replace jigasi-server with your Jigasi SIP address/peer name
;         Timeout: 30 seconds, ring-only (no answer supervision needed)
    same => n,Dial(SIP/jigasi-server,,tT)
    same => n,Hangup()

; Error handler: JWT generation failed
exten => jwt_fail,1,Playback(an-error-has-occurred)
    same => n,Verbose(1,JWT generation failed: ${JWT_ERROR})
    same => n,Hangup()


; -----------------------------------------------------------------------------
; PATTERN 2: Dynamic Room via IVR
; Caller dials a general conference number (e.g. 5000) and enters the room
; name/number via DTMF. Useful for ad-hoc meetings.
; -----------------------------------------------------------------------------
[jitsi-dynamic-room]

; Step 1: Answer and prompt for room number
exten => 5000,1,Answer()
    same => n,Playback(conf-getconfno)

; Step 2: Read room number from DTMF input (up to 10 digits, 5s timeout)
    same => n,Read(ROOM_NUMBER,,10,,1,5)

; Step 3: Validate that something was entered
    same => n,GotoIf($["${ROOM_NUMBER}" = ""]?invalid,1)

; Step 4: Build the room name (prefix with "room-" for readability)
    same => n,Set(JITSI_ROOM=room-${ROOM_NUMBER})

; Step 5: Generate JWT via AGI
    same => n,AGI(generate-jwt-agi.py,${CALLERID(num)},${JITSI_ROOM})

; Step 6: Check result
    same => n,GotoIf($["${JWT_STATUS}" != "OK"]?jwt_fail,1)

; Step 7: Set SIP headers for Jigasi
    same => n,SIPAddHeader(Jitsi-Conference-Room: ${JITSI_ROOM})
    same => n,SIPAddHeader(Authorization: Bearer ${JWT_TOKEN})

; Step 8: Dial Jigasi
    same => n,Dial(SIP/jigasi-server,,tT)
    same => n,Hangup()

; No room number entered
exten => invalid,1,Playback(conf-invalid)
    same => n,Goto(jitsi-dynamic-room,5000,1)

; JWT error handler
exten => jwt_fail,1,Playback(an-error-has-occurred)
    same => n,Verbose(1,JWT generation failed for room ${JITSI_ROOM}: ${JWT_ERROR})
    same => n,Hangup()


; -----------------------------------------------------------------------------
; PATTERN 3: Direct Room Name via DID Mapping
; Map specific DIDs or extension ranges to room names. Each DID goes to a
; different room without any IVR prompting.
; -----------------------------------------------------------------------------
[jitsi-did-mapping]

; Extensions 6001-6099 each map to a room name
exten => _600X,1,Answer()
    same => n,Set(JITSI_ROOM=conference-${EXTEN})
    same => n,AGI(generate-jwt-agi.py,${CALLERID(num)},${JITSI_ROOM})
    same => n,GotoIf($["${JWT_STATUS}" != "OK"]?jwt_fail,1)
    same => n,SIPAddHeader(Jitsi-Conference-Room: ${JITSI_ROOM})
    same => n,SIPAddHeader(Authorization: Bearer ${JWT_TOKEN})
    same => n,Dial(SIP/jigasi-server,,tT)
    same => n,Hangup()

exten => jwt_fail,1,Playback(an-error-has-occurred)
    same => n,Hangup()


; =============================================================================
; Jigasi SIP Peer Configuration (sip.conf or pjsip.conf)
; =============================================================================
;
; If using chan_sip (sip.conf):
;
;   [jigasi-server]
;   type=peer
;   host=10.0.0.50             ; Jigasi server IP
;   port=5060             ; Default SIP port (5060, or custom)
;   context=from-jigasi
;   disallow=all
;   allow=opus
;   allow=ulaw
;   dtmfmode=rfc2833
;
; If using PJSIP (pjsip.conf):
;
;   [jigasi-server]
;   type=endpoint
;   transport=transport-udp
;   aors=jigasi-server
;   disallow=all
;   allow=opus
;   allow=ulaw
;
;   [jigasi-server]
;   type=aor
;   contact=sip:10.0.0.50:5060
;
; Replace 10.0.0.50 with your Jigasi server IP.
; Jigasi listens on SIP port 5060 by default.
; =============================================================================
